name: Refresh Job Market Analytics

on:
  schedule:
    # 02:30 UTC is 08:00 IST. The job repeats every four hours to keep the snapshot fresh.
    - cron: "30 2,6,10,14,18,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-job-market-analytics
  cancel-in-progress: true

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion cycle once
        env:
          JSEARCH_KEY: ${{ secrets.JSEARCH_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ingestion/scheduler.py --once

      - name: Commit refreshed analytical core entries
        run: |
          git add data
          if git diff --cached --quiet; then
            echo "No analytical data updates detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh job market analytics"
          git push
