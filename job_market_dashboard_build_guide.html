def fetch_jobs(query="data scientist", location="Delhi"):

    params = {"query": f"{query} in {location}",

def save_to_db(jobs):

        title TEXT, company TEXT,
        location TEXT, salary TEXT,
        description TEXT, skills TEXT,
        posted_at TEXT, fetched_at TEXT
    )""")

from sklearn.cluster import KMeans

def cluster_jobs(descriptions, n=5):
    vec = TfidfVectorizer(max_features=100, stop_words="english")
    X = vec.fit_transform(descriptions)
    km = KMeans(n_clusters=n, random_state=42)

def score_resume(resume_text, job_descs):
    vec = TfidfVectorizer(stop_words="english")
    corpus = [resume_text] + job_descs
    tfidf = vec.fit_transform(corpus)
    scores = cosine_similarity(tfidf[0:1], tfidf[1:])
    return scores[0]  # array of fit scores</div>

from sklearn.linear_model import LinearRegression
import numpy as np

def forecast_trend(daily_counts):
    # daily_counts: list of (date, count) tuples
    df = pd.DataFrame(daily_counts, columns=["date","count"])
    df["day_num"] = range(len(df))
    X = df[["day_num"]]
    y = df["count"]
    model = LinearRegression().fit(X, y)
    # predict next 7 days
    future = pd.DataFrame({"day_num": range(len(df), len(df)+7)})
    return model.predict(future)  # upward = growing demand</div>

let current = 0;

function render() {
  const nav = document.getElementById('stepNav');
  const panels = document.getElementById('panels');
  nav.innerHTML = steps.map((s, i) =>
    `<button class="step-pill ${i===current?'active':''}" onclick="go(${i})">${i+1}. ${s.label}</button>`
  ).join('');
  panels.innerHTML = steps.map((s, i) => `
    <div class="panel ${i===current?'active':''}" id="panel-${i}">
      <p class="panel-title">${s.title}</p>
      <p class="panel-sub">${s.sub}</p>
      ${s.content()}
      <div class="nav-row">
        ${i > 0 ? `<button class="nav-btn" onclick="go(${i-1})">← Previous</button>` : '<span></span>'}
        ${i < steps.length-1 ? `<button class="nav-btn primary" onclick="go(${i+1})">Next →</button>` : '<span></span>'}
      </div>
    </div>
  `).join('');
}

function go(i) {
  current = i;
  render();
  document.querySelector('.root').scrollIntoView({behavior:'smooth'});
}

render();
</script>
